services:
  db:
    image: mysql:8.0
    container_name: sykell-db
    environment:
      MYSQL_DATABASE: "crawler"
      MYSQL_USER: "crawler_user"
      MYSQL_PASSWORD: "supersecret"
      MYSQL_ROOT_PASSWORD: "supersecret"
      TZ: "UTC"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: ["--default-time-zone=+00:00"]
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-psupersecret",
        ]
      interval: 3s
      timeout: 3s
      retries: 30
volumes:
  db_data:
